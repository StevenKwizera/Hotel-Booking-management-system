spring:
  application:
    name: orkestra-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orkestra}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:ksteven}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

server:
  port: ${SERVER_PORT:8080}

orkestra:
  jwt:
    secret: ${JWT_SECRET:orkestra-net-luna-villa-auca-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175}
  mail:
    from: ${MAIL_FROM:}
    from-name: ${MAIL_FROM_NAME:Orkestra Hospitality}
    enabled: ${MAIL_ENABLED:true}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  hotel-name: ${ORKESTRA_HOTEL_NAME:Net Luna Villa Hotel}
  admin:
    email: ${ORKESTRA_ADMIN_EMAIL:stevegatanazi@gmail.com}
    name: ${ORKESTRA_ADMIN_NAME:Steve Gatanazi}
    password: ${ORKESTRA_ADMIN_PASSWORD:Orkestra@2026}

paypack:
  base-url: ${PAYPACK_BASE_URL:https://payments.paypack.rw/api}
  client-id: ${PAYPACK_CLIENT_ID:}
  client-secret: ${PAYPACK_CLIENT_SECRET:}
  webhook-mode: ${PAYPACK_WEBHOOK_MODE:production}
  webhook-secret: ${PAYPACK_WEBHOOK_SECRET:}
  simulate-when-unconfigured: ${PAYPACK_SIMULATE_WHEN_UNCONFIGURED:false}
  use-test-amount: ${PAYPACK_USE_TEST_AMOUNT:false}
  test-amount-rwf: ${PAYPACK_TEST_AMOUNT_RWF:5}
  merchant-phones: ${PAYPACK_MERCHANT_PHONES:${PAYPACK_MERCHANT_PHONE:0789738349,0789403583}}
  sync-interval-ms: ${PAYPACK_SYNC_INTERVAL_MS:15000}

logging:
  level:
    com.orkestra: INFO
